<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <defs>
    <!-- Background glow for dark mode -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Primary purple gradient -->
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>

    <!-- Accent teal/green gradient -->
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Shiny gloss effect -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Soft background glow -->
  <circle cx="256" cy="256" r="230" fill="url(#glow)"/>

  <!-- Isometric Outer Shield/Hexagon -->
  <polygon points="256,40 430,140 430,340 256,440 82,340 82,140" fill="none" stroke="url(#purple-grad)" stroke-width="14" stroke-linejoin="round"/>

  <!-- Inside Isometric Box (Top face) -->
  <polygon points="256,120 370,185 256,250 142,185" fill="url(#purple-grad)" opacity="0.85"/>
  <polygon points="256,120 370,185 256,250 142,185" fill="url(#glass)" />

  <!-- Inside Isometric Box (Left face) -->
  <polygon points="142,185 256,250 256,380 142,315" fill="url(#purple-grad)" />

  <!-- Inside Isometric Box (Right face) -->
  <polygon points="256,250 370,185 370,315 256,380" fill="url(#teal-grad)" />

  <!-- Central "IM" letters overlaid in white with drop shadow for modern SaaS feel -->
  <text x="256" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#shadow)" letter-spacing="-2">IM</text>
</svg>